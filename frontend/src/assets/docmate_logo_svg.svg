<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" role="img" aria-labelledby="dm-title dm-desc">
  <title id="dm-title">DocMate</title>
  <desc id="dm-desc">DocMate logo — document icon with wordmark</desc>

  <defs>
    <linearGradient id="dm-fold-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff5b36" />
      <stop offset="100%" stop-color="#ff2b63" />
    </linearGradient>
    <filter id="dm-icon-shadow" x="-25%" y="-25%" width="150%" height="170%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1d1b22" flood-opacity="0.18" />
    </filter>
  </defs>

  <!-- ── Icon badge ── -->
  <g filter="url(#dm-icon-shadow)">
    <rect x="0" y="10" width="100" height="100" rx="26" fill="#1d1b22" />
  </g>

  <!-- Page with dog-ear fold -->
  <polygon points="22,27 58,27 78,47 78,93 22,93" fill="white" opacity="0.96" />

  <!-- Red fold triangle -->
  <polygon points="58,27 78,47 58,47" fill="url(#dm-fold-glow)" />

  <!-- Subtle fold shadow -->
  <polygon points="58,27 78,47 58,47" fill="#1d1b22" opacity="0.08" />

  <!-- Content lines -->
  <rect x="30" y="58" width="26" height="4" rx="2" fill="#1d1b22" opacity="0.20" />
  <rect x="30" y="68" width="36" height="4" rx="2" fill="#1d1b22" opacity="0.14" />
  <rect x="30" y="78" width="30" height="4" rx="2" fill="#1d1b22" opacity="0.14" />

  <!-- Mate dot — red companion accent -->
  <circle cx="82" cy="95" r="9" fill="#ff2b63" />

  <!-- ── Wordmark ── -->
  <!-- "Doc" — bold, dark -->
  <text
    x="122"
    y="82"
    font-family="'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif"
    font-size="72"
    font-weight="800"
    fill="#1d1b22"
    letter-spacing="-2"
  >Doc</text>

  <!-- "Mate" — regular, muted -->
  <text
    x="319"
    y="82"
    font-family="'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif"
    font-size="72"
    font-weight="400"
    fill="#57525f"
    letter-spacing="-1.5"
  >Mate</text>
</svg>
